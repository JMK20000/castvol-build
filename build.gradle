plugins {
    id 'com.android.application'
}

// 이 부분을 추가하세요!
repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

android {
    compileSdk 34
    namespace 'io.axiom.castvol'

    defaultConfig {
        applicationId "io.axiom.castvol"
        minSdk 31
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    // ... 나머지 내용은 그대로 유지 ...
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
